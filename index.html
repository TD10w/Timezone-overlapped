<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time zone overlap</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <div class="app-headline">
        <div class="app-title-group">
          <h1 class="app-title">Timezone<span class="app-title-accent"> Overlap</span></h1>
          <p class="app-subtitle">Find shared working hours across the world</p>
        </div>
        <div class="headline-clock-group">
          <time id="live-clock" class="live-clock" aria-live="off"></time>
          <p id="live-date" class="live-date"></p>
        </div>
      </div>

      <header class="topbar">
        <div class="add-zone-bar">
          <div class="tz-combobox">
            <input
              id="add-tz-input"
              type="text"
              list="timezone-options"
              autocomplete="off"
              placeholder="Add a city or country…"
            />
            <input id="add-tz-value" type="hidden" />
            <span class="combobox-arrow" aria-hidden="true">▾</span>
          </div>
          <button id="add-btn">Add</button>
        </div>
      </header>

      <div id="zone-chips" class="zone-chips"></div>

      <div class="legend">
        <span class="legend-item">
          <span class="legend-swatch legend-swatch--work"></span>
          Work hours
        </span>
        <span class="legend-sep">·</span>
        <span class="legend-item">
          <span class="legend-swatch legend-swatch--overlap"></span>
          Overlap window
        </span>
      </div>

      <div class="timeline-wrap">
        <div id="timeline-matrix" class="timeline-matrix"></div>
      </div>

      <p id="overlap-summary" class="overlap-summary"></p>

      <details class="translator-section">
        <summary class="translator-summary">
          <span class="translator-header">Time translator</span>
          <span class="translator-summary-copy">Convert one exact time across the visible zones</span>
        </summary>
        <div class="translator-body">
          <div class="translator-input-row">
            <input id="translate-time" type="time" value="12:00" class="translate-time-input" />
            <span class="translator-label">in</span>
            <div class="tz-combobox translator-tz-wrap">
              <input
                id="translate-tz-input"
                type="text"
                list="timezone-options"
                autocomplete="off"
                placeholder="Source timezone"
              />
              <input id="translate-tz-value" type="hidden" />
              <span class="combobox-arrow" aria-hidden="true">▾</span>
            </div>
            <span class="translator-label">on</span>
            <input id="translate-date" type="date" class="translate-date-input" />
          </div>
          <div id="translate-results" class="translate-results"></div>
        </div>
      </details>
    </main>

    <datalist id="timezone-options"></datalist>
    <script src="./script.js"></script>
  </body>
</html>
